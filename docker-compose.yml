name: medai-a1

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: medai-a1/api:local
    container_name: medai-a1-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
    networks: [medai]

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    container_name: medai-a1-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    command: >
      mlflow server
        --backend-store-uri sqlite:////mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts
        --host 0.0.0.0
        --port 5000
    networks: [medai]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: medai-a1-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [medai]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: medai-a1-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    depends_on:
      - prometheus
    networks: [medai]

  evidently-worker:
    build:
      context: .
      dockerfile: Dockerfile.evidently
    image: medai-a1/evidently-worker:local
    container_name: medai-a1-evidently
    restart: unless-stopped
    ports:
      - "8001:8001"
    networks: [medai]

networks:
  medai:
    driver: bridge

volumes:
  mlflow-data:
  prometheus-data:
  grafana-data: