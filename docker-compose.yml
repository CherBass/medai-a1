name: medai-a1

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: medai-a1/api:local
    container_name: medai-a1-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
    networks: [medai]

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    container_name: medai-a1-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    command: >
      mlflow server
        --backend-store-uri sqlite:////mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts
        --host 0.0.0.0
        --port 5000
    networks: [medai]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: medai-a1-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [medai]

networks:
  medai:
    driver: bridge

volumes:
  mlflow-data:
  prometheus-data: